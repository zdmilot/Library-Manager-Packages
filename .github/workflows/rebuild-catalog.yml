name: Rebuild Package Catalog

on:
  workflow_dispatch:
  push:
    paths:
      - 'Packages/**'

permissions:
  contents: write

jobs:
  rebuild-catalog:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild catalog.json
        run: node build-catalog.js

      - name: Commit and push catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "Auto-rebuild catalog.json [skip ci]"
          git push
